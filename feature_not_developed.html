<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Under Construction</title>
<style>
  body {
    background-color: #000;
    color: #fff;
    font-family: 'Press Start 2P', cursive;
    text-align: center;
    margin: 0;
    padding: 0;
  }

  .container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  .construction-text {
    font-size: 24px;
    margin-bottom: 20px;
  }

  .construction-text::after {
    content: '_';
    animation: blink-caret 0.75s infinite;
  }

  @keyframes blink-caret {
    50% {
      opacity: 0;
    }
  }

  .construction-animation {
    font-size: 18px;
    animation: blink 1.5s infinite;
  }

  @keyframes blink {
    0%, 100% {
      opacity: 1;
    }
    50% {
      opacity: 0.5;
    }
  }
</style>
</head>
<body>
<div class="container">
  <h1 class="construction-text">Trang web này đang được xây dựng!</h1>
  <div class="construction-animation">Loading...</div>
</div>
</body>
</html>
