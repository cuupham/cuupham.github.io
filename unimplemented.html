<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chức năng chưa phát triển</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
        }
        p {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Chức năng chưa phát triển</h1>
        <p>Xin lỗi, chức năng này hiện tại chưa được phát triển.</p>
        <p>Chúng tôi đang làm việc chăm chỉ để cải thiện trải nghiệm của bạn. Vui lòng quay lại sau để kiểm tra xem chức năng này đã được triển khai hay chưa.</p>
        <p>Xin lỗi vì sự bất tiện này và cảm ơn bạn đã ghé thăm!</p>
    </div>
</body>
</html>
